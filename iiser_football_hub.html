<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IISER Mohali FC</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#0a0e1a;--navy2:#0f1628;--navy3:#162040;--navy4:#1e2d55;
  --blue:#1a6cf5;--blue-light:#4d8fff;--blue-glow:#1a6cf522;
  --silver:#c8d4e8;--silver2:#8898b8;--white:#f0f4ff;
  --red:#e83a3a;--gold:#f0b429;--green:#22c55e;
  --border:#1e2d55;--border2:#253660;
}
body{background:var(--navy);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}
nav{background:var(--navy2);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:50px;position:fixed;top:0;left:0;right:0;z-index:100;border-bottom:2px solid var(--blue);}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--white);}
.nav-logo span{color:var(--blue-light);}
.nav-admin{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--silver2);background:var(--navy3);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;text-decoration:none;transition:color .15s;}
.nav-admin:hover{color:var(--blue-light);}
.top-spacer{height:50px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--navy2);border-top:2px solid var(--border);display:flex;z-index:100;}
.bnav-btn{flex:1;padding:8px 0 6px;display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;color:var(--silver2);transition:color .15s;}
.bnav-btn.active{color:var(--blue-light);}
.bnav-btn i{font-size:17px;}
.bnav-btn span{font-size:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;}
.pb{height:70px;}
.page{display:none;}.page.active{display:block;}
.hero{background:linear-gradient(135deg,var(--navy3) 0%,var(--navy2) 100%);padding:1.25rem 1rem 1rem;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:var(--blue-glow);pointer-events:none;}
.hero-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--blue-light);text-transform:uppercase;margin-bottom:3px;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;letter-spacing:2px;margin-bottom:4px;}
.hero-title span{color:var(--blue-light);}
.hero-sub{font-size:12px;color:var(--silver2);}
.section{padding:1.1rem 1rem;}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;display:flex;align-items:center;gap:8px;}
.sec-bar{width:3px;height:18px;background:var(--blue);border-radius:2px;display:inline-block;}
.divider{height:1px;background:var(--border);margin:0 1rem;}
.live-badge{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:3px;}
.live-dot{width:5px;height:5px;background:#fff;border-radius:50%;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* EMPTY STATE */
.empty-state{text-align:center;padding:3rem 1rem;}
.empty-state-icon{font-size:40px;margin-bottom:12px;opacity:.5;}
.empty-state-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:6px;color:var(--silver);}
.empty-state-sub{font-size:13px;color:var(--silver2);line-height:1.6;}

/* MATCH CARDS */
.match-card{background:var(--navy2);border:1px solid var(--border);border-radius:8px;padding:.9rem;margin-bottom:9px;cursor:pointer;transition:border-color .15s;}
.match-card:hover{border-color:var(--blue);}
.match-card.live{border-color:var(--red);}
.match-card.friendly{border-left:3px solid var(--gold);}
.match-meta{font-size:11px;color:var(--silver2);font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.match-row{display:flex;align-items:center;justify-content:space-between;}
.team{display:flex;align-items:center;gap:7px;flex:1;}
.team.away{flex-direction:row-reverse;text-align:right;}
.tbadge{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:11px;flex-shrink:0;}
.tname{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.3px;line-height:1.2;}
.score-box{display:flex;align-items:center;margin:0 6px;}
.score{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;min-width:22px;text-align:center;}
.score-sep{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--silver2);padding:0 3px;}
.match-foot{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;color:var(--silver2);margin-top:5px;letter-spacing:1px;}
.match-foot.live-t{color:var(--red);}
.friendly-tag{font-size:10px;background:rgba(240,180,41,0.15);color:var(--gold);padding:1px 6px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(5,8,18,0.95);z-index:200;display:none;overflow-y:auto;}
.modal-overlay.open{display:block;}
.modal{background:var(--navy2);min-height:100vh;max-width:500px;margin:0 auto;}
.modal-nav{background:var(--navy3);padding:.75rem 1rem;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.modal-back{background:none;border:none;cursor:pointer;color:var(--silver);display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.modal-match-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--silver2);letter-spacing:1px;}
.modal-scoreboard{background:var(--navy3);padding:1.5rem 1rem 1rem;text-align:center;border-bottom:1px solid var(--border);}
.modal-tournament{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--blue-light);text-transform:uppercase;margin-bottom:12px;}
.modal-teams{display:flex;align-items:center;justify-content:center;gap:16px;}
.modal-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.modal-badge{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;}
.modal-tname{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-align:center;line-height:1.2;}
.modal-score-center{display:flex;flex-direction:column;align-items:center;gap:2px;}
.modal-score-big{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;letter-spacing:4px;}
.modal-score-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--silver2);text-transform:uppercase;}
.modal-scorers{margin-top:10px;display:flex;justify-content:space-between;padding:0 4px;}
.modal-scorer-col{flex:1;font-size:11px;color:var(--silver);line-height:1.8;}
.modal-scorer-col.right{text-align:right;}
.modal-section{padding:1rem;}
.modal-sec-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--white);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.full-stat-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:8px;}
.full-stat-row .home-bar-wrap{height:5px;background:var(--navy4);border-radius:3px;overflow:hidden;}
.full-stat-row .home-bar-fill{height:100%;background:var(--blue);border-radius:3px;margin-left:auto;}
.full-stat-row .away-bar-wrap{height:5px;background:var(--navy4);border-radius:3px;overflow:hidden;}
.full-stat-row .away-bar-fill{height:100%;background:var(--red);border-radius:3px;}
.full-stat-row .stat-center{text-align:center;}
.full-stat-row .stat-center .slabel{font-size:10px;color:var(--silver2);font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.5px;white-space:nowrap;}
.full-stat-row .home-num{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-align:right;}
.full-stat-row .away-num{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-align:left;}
.cards-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.card-icon{width:14px;height:18px;border-radius:2px;flex-shrink:0;}
.card-icon.yellow{background:var(--gold);}
.card-icon.red{background:var(--red);}
.card-player{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;flex:1;}
.card-min{font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--blue-light);}
.card-team{font-size:10px;color:var(--silver2);}
.timeline{padding:0 1rem 1rem;}
.tl-item{display:flex;gap:10px;margin-bottom:14px;position:relative;}
.tl-item::before{content:'';position:absolute;left:38px;top:22px;width:1px;height:calc(100% + 6px);background:var(--border);}
.tl-item:last-child::before{display:none;}
.tl-min{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--blue-light);min-width:28px;text-align:right;padding-top:2px;}
.tl-dot-wrap{display:flex;flex-direction:column;align-items:center;}
.tl-dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;z-index:1;}
.tl-dot.goal{background:var(--green);}.tl-dot.yellow{background:var(--gold);}.tl-dot.red{background:var(--red);}
.tl-dot.sub{background:var(--blue);}.tl-dot.penalty{background:var(--green);border:2px solid var(--gold);}
.tl-dot.save{background:var(--silver2);}.tl-dot.corner{background:var(--navy4);border:1px solid var(--border2);}
.tl-dot.highlight{background:#a855f7;}.tl-dot.freekick{background:#f97316;}
.tl-dot.shot,.tl-dot.shot_on_target{background:var(--blue);}
.tl-dot.offside{background:#64748b;}.tl-dot.foul{background:#7c3aed;}
.tl-dot.ko,.tl-dot.ht,.tl-dot.ft,.tl-dot.stoppage{background:var(--navy3);border:1px solid var(--silver2);}
.tl-body{flex:1;}
.tl-event{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;line-height:1.3;}
.tl-detail{font-size:11px;color:var(--silver2);margin-top:2px;line-height:1.4;}
.tl-badge{display:inline-block;font-size:9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;}
.tl-badge.pen{background:rgba(240,180,41,0.2);color:var(--gold);}
.tl-side{font-size:10px;color:var(--silver2);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;}

/* STANDINGS */
.standings-table{width:100%;border-collapse:collapse;font-size:12px;}
.standings-table th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--silver2);padding:5px 3px;text-align:center;border-bottom:1px solid var(--border);}
.standings-table th:nth-child(2){text-align:left;}
.standings-table td{padding:7px 3px;text-align:center;border-bottom:1px solid var(--border);}
.standings-table td:nth-child(2){text-align:left;}
.standings-table tr:last-child td{border-bottom:none;}
.pos{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--silver2);font-size:13px;}
.pos.top{color:var(--blue-light);}
.tinline{display:flex;align-items:center;gap:5px;}
.mbadge{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;font-family:'Bebas Neue',sans-serif;flex-shrink:0;}
.pts{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:var(--white);}
.form-dots{display:flex;gap:2px;justify-content:center;}
.fd{width:7px;height:7px;border-radius:50%;}
.fd.w{background:var(--green);}.fd.d{background:var(--gold);}.fd.l{background:var(--red);}

/* BRACKET */
.bracket-wrap{overflow-x:auto;padding-bottom:8px;}
.bracket{display:flex;gap:10px;min-width:300px;}
.b-round{display:flex;flex-direction:column;gap:6px;}
.b-round-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--silver2);margin-bottom:3px;text-align:center;}
.b-match{background:var(--navy2);border:1px solid var(--border);border-radius:6px;overflow:hidden;min-width:105px;}
.b-team{padding:5px 8px;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:4px;}
.b-team:first-child{border-bottom:1px solid var(--border);}
.b-team.winner{color:var(--blue-light);}.b-team.tbd{opacity:.35;}
.b-sc{font-size:12px;font-weight:700;}

/* TOURNAMENT CARDS */
.t-card{background:var(--navy2);border:1px solid var(--border);border-radius:10px;padding:.9rem;margin-bottom:9px;}
.t-card-top{display:flex;align-items:center;gap:10px;}
.t-icon{width:42px;height:42px;border-radius:8px;background:var(--navy3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.t-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.4px;}
.t-meta{font-size:11px;color:var(--silver2);margin-top:1px;}
.t-status{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:3px;margin-left:auto;flex-shrink:0;}
.t-status.ongoing{background:rgba(26,108,245,0.2);color:var(--blue-light);}
.t-status.upcoming{background:rgba(240,180,41,0.15);color:var(--gold);}
.t-status.done{background:rgba(100,110,130,0.2);color:var(--silver2);}
.t-desc{font-size:12px;color:var(--silver2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5;}

/* NEWS */
.news-card{background:var(--navy2);border:1px solid var(--border);border-radius:10px;padding:.9rem;margin-bottom:9px;}
.news-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:3px;display:inline-block;margin-bottom:7px;}
.news-tag.result{background:rgba(26,108,245,0.2);color:var(--blue-light);}
.news-tag.preview{background:rgba(240,180,41,0.15);color:var(--gold);}
.news-tag.update{background:rgba(34,197,94,0.15);color:var(--green);}
.news-tag.friendly{background:rgba(240,180,41,0.12);color:var(--gold);}
.news-headline{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;line-height:1.3;margin-bottom:5px;letter-spacing:.3px;}
.news-byline{font-size:11px;color:var(--silver2);}
.news-excerpt{font-size:12px;color:var(--silver);margin-top:7px;line-height:1.6;}
.news-big{border-left:3px solid var(--blue);}

/* TEAMS */
.team-card{background:var(--navy2);border:1px solid var(--border);border-radius:10px;padding:.9rem;margin-bottom:9px;cursor:pointer;transition:border-color .2s;}
.team-card:hover{border-color:var(--blue);}
.team-card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.team-big-badge{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;flex-shrink:0;}
.team-full-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.4px;}
.team-type{font-size:11px;color:var(--silver2);margin-top:1px;}
.team-type-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-left:auto;flex-shrink:0;}
.team-type-badge.hostel{background:rgba(26,108,245,0.18);color:var(--blue-light);}
.team-type-badge.batch{background:rgba(240,180,41,0.15);color:var(--gold);}
.team-type-badge.mixed{background:rgba(168,85,247,0.15);color:#c084fc;}
.team-type-badge.external{background:rgba(34,197,94,0.15);color:var(--green);}
.team-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.tstat{background:var(--navy3);border-radius:6px;padding:6px 4px;text-align:center;}
.tstat-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--blue-light);line-height:1;}
.tstat-label{font-size:9px;color:var(--silver2);text-transform:uppercase;letter-spacing:.8px;margin-top:1px;}

/* TEAM MODAL */
.team-hero{padding:1.5rem 1rem 1.2rem;text-align:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden;background:linear-gradient(160deg,var(--navy3),var(--navy2));}
.team-hero-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:130px;opacity:.05;pointer-events:none;}
.team-hero-badge{width:70px;height:70px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:26px;margin:0 auto 10px;}
.team-hero-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:2px;}
.team-hero-sub{font-size:12px;color:var(--silver2);}
.team-hero-type{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:3px;margin-top:6px;}
.team-overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:1rem;}
.tov-stat{background:var(--navy3);border-radius:8px;padding:10px 6px;text-align:center;}
.tov-num{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--blue-light);line-height:1;}
.tov-label{font-size:9px;color:var(--silver2);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}
.tov-num.gold{color:var(--gold);}.tov-num.green{color:var(--green);}.tov-num.red{color:var(--red);}
.trophy-row{display:flex;align-items:center;gap:12px;background:var(--navy3);border-radius:8px;padding:.75rem;margin-bottom:8px;}
.trophy-icon{font-size:24px;flex-shrink:0;}
.trophy-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;}
.trophy-year{font-size:11px;color:var(--silver2);}
.team-player-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;}
.team-pcard{background:var(--navy3);border-radius:8px;padding:10px;min-width:80px;text-align:center;flex-shrink:0;cursor:pointer;}
.team-pavatar{width:34px;height:34px;border-radius:50%;margin:0 auto 5px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:12px;}
.team-pname{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;line-height:1.2;margin-bottom:2px;}
.team-pval{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--blue-light);}
.team-plbl{font-size:8px;color:var(--silver2);text-transform:uppercase;letter-spacing:.5px;}
.squad-table{width:100%;border-collapse:collapse;}
.squad-table th{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--silver2);padding:6px 8px;border-bottom:1px solid var(--border);text-align:left;}
.squad-table td{padding:8px;border-bottom:1px solid var(--border);font-size:13px;}
.squad-table tr:last-child td{border-bottom:none;}
.squad-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;}
.squad-pos{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:.8px;padding:1px 5px;border-radius:3px;text-transform:uppercase;}
.squad-pos.gk{background:rgba(240,180,41,.2);color:var(--gold);}

<script>
const SUPABASE_URL = 'https://xxycceiosiabvoqtoghj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4eWNjZWlvc2lhYnZvcXRvZ2hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTYyNTUsImV4cCI6MjA5NjQzMjI1NX0.Yj-ZvbBr8-Y-IR8IUhz6qV8s_9cn9yyyokdCzypEhQA';

// ── NAV ──────────────────────────────────────────────────────────────────────
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  window.scrollTo(0, 0);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
}
function fmtTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':');
  const hr = parseInt(h);
  return `${hr > 12 ? hr - 12 : hr}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
}
function initials(name) {
  return (name || '').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}
function emptyState(icon, title, sub) {
  return `<div class="empty-state"><div class="empty-state-icon">${icon}</div><div class="empty-state-title">${title}</div><div class="empty-state-sub">${sub}</div></div>`;
}

// ── SCORES PAGE ───────────────────────────────────────────────────────────────
async function loadScores() {
  const el = document.getElementById('scores-section');

  const { data: live } = await sb.from('matches')
    .select(`*, half_duration, home:home_team_id(name,code,badge_bg,badge_color), away:away_team_id(name,code,badge_bg,badge_color), tournament:tournament_id(name,is_friendly)`)
    .eq('status', 'live').order('match_date').order('match_time');

  const { data: upcoming } = await sb.from('matches')
    .select(`*, half_duration, home:home_team_id(name,code,badge_bg,badge_color), away:away_team_id(name,code,badge_bg,badge_color), tournament:tournament_id(name,is_friendly)`)
    .eq('status', 'upcoming').order('match_date').order('match_time').limit(5);

  const { data: results } = await sb.from('matches')
    .select(`*, half_duration, home:home_team_id(name,code,badge_bg,badge_color), away:away_team_id(name,code,badge_bg,badge_color), tournament:tournament_id(name,is_friendly)`)
    .eq('status', 'ft').order('match_date', { ascending: false }).order('match_time', { ascending: false }).limit(5);

  let html = '';

  if (live && live.length > 0) {
    html += `<div class="sec-hd"><div class="sec-title"><span class="sec-bar"></span>Live Now</div></div>`;
    live.forEach(m => html += matchCard(m, true));
  }

  if (upcoming && upcoming.length > 0) {
    html += `<div class="sec-hd" style="margin-top:1rem;"><div class="sec-title"><span class="sec-bar"></span>Upcoming</div></div>`;
    upcoming.forEach(m => html += matchCard(m, false));
  }

  if (results && results.length > 0) {
    html += `<div class="sec-hd" style="margin-top:1rem;"><div class="sec-title"><span class="sec-bar"></span>Recent Results</div></div>`;
    results.forEach(m => html += matchCard(m, false));
  }

  if (!html) {
    html = emptyState('⚽', 'No Matches Yet', 'Check back when the tournament kicks off.\nMatches will appear here once they are scheduled.');
  }

  el.innerHTML = html;

  // Realtime score updates
  sb.channel('live-scores').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'matches' }, () => {
    loadScores();
  }).subscribe();
}

function matchCard(m, isLive) {
  const h = m.home || {}, a = m.away || {};
  const isFriendly = m.is_friendly || m.tournament?.is_friendly;
  const tName = m.tournament?.name || '';
  const halfDur = m.half_duration || 45;
  const halfForDisplay = (m.minute||0) <= halfDur ? 1 : 2;
  const statusLabel = m.status === 'live'
    ? `<span id="mf-min-${m.id}" style="font-family:Bebas Neue,sans-serif;font-size:15px;">${getDisplayMin(m.minute||0, halfForDisplay, halfDur)}'</span><span id="mf-sec-${m.id}" style="font-size:10px;opacity:.7;margin-left:2px;">00</span><span style="font-size:11px;"> · Tap for match facts</span>`
    : m.status === 'ft' ? 'FT · Tap for match facts'
    : m.status === 'ht' ? `HT — ${m.half_duration||45}' · Tap for match facts`
    : `${fmtDate(m.match_date)}${m.match_time ? ' · ' + fmtTime(m.match_time) : ''}`;
  const scoreHtml = m.status === 'upcoming'
    ? `<div class="score" style="color:var(--silver2);font-size:16px;">VS</div>`
    : `<div class="score" id="sh-${m.id}">${m.home_score}</div><div class="score-sep">–</div><div class="score" id="sa-${m.id}">${m.away_score}</div>`;
  // Register live match clock
  if (isLive && m.status === 'live') {
    const halfDur = m.half_duration || 45;
    const half = (m.minute || 0) <= halfDur ? 1 : 2;
    const existing = liveMatchClocks[m.id];
    liveMatchClocks[m.id] = {
      minute: m.minute || 0,
      status: 'live',
      half,
      halfDur,
      totalSeconds: existing ? existing.totalSeconds : 0
    };
  }

  return `<div class="match-card${isLive ? ' live' : ''}${isFriendly ? ' friendly' : ''}" onclick="openMatch('${m.id}')">
    <div class="match-meta">${isLive ? '<div class="live-badge"><div class="live-dot"></div>LIVE</div>' : ''}${tName}${m.stage ? ' · ' + m.stage : ''}${isFriendly ? ' <span class="friendly-tag">Friendly</span>' : ''}</div>
    <div class="match-row">
      <div class="team"><div class="tbadge" style="background:${h.badge_bg || '#0d2a5c'};color:${h.badge_color || '#7ab0f5'};">${h.code || '?'}</div><div class="tname">${h.name || 'Home'}</div></div>
      <div class="score-box">${scoreHtml}</div>
      <div class="team away"><div class="tname">${a.name || 'Away'}</div><div class="tbadge" style="background:${a.badge_bg || '#4a0d0d'};color:${a.badge_color || '#f08080'};">${a.code || '?'}</div></div>
    </div>
    <div class="match-foot${isLive ? ' live-t' : ''}" id="mf-${m.id}">${statusLabel}</div>
  </div>`;
}

// ── UPCOMING PAGE ─────────────────────────────────────────────────────────────
async function loadUpcoming() {
  const el = document.getElementById('upcoming-section');
  const { data } = await sb.from('matches')
    .select(`*, home:home_team_id(name,code,badge_bg,badge_color), away:away_team_id(name,code,badge_bg,badge_color), tournament:tournament_id(name)`)
    .eq('status', 'upcoming').order('match_date').order('match_time').limit(20);

  if (!data || !data.length) {
    el.innerHTML = `<div class="sec-hd"><div class="sec-title"><span class="sec-bar"></span>Upcoming Matches</div></div>` + emptyState('📅', 'No Upcoming Matches', 'All scheduled matches will appear here.\nCheck back closer to the next tournament.');
    return;
  }

  let html = `<div class="sec-hd"><div class="sec-title"><span class="sec-bar"></span>Upcoming Matches</div></div>`;
  data.forEach((m, i) => {
    const h = m.home || {}, a = m.away || {};
    const tName = m.tournament?.name || 'Match';
    html += `<div class="upcoming-card${i === 0 ? ' featured' : ''}">
      <div class="uc-header">
        <div class="uc-tournament">${tName}${m.stage ? ' · ' + m.stage : ''}</div>
        <div class="uc-date">${fmtDate(m.match_date)}${m.match_time ? ' · ' + fmtTime(m.match_time) : ''}</div>
      </div>
      <div class="uc-match">
        <div class="uc-team"><div class="uc-badge" style="background:${h.badge_bg || '#0d2a5c'};color:${h.badge_color || '#7ab0f5'};">${h.code || '?'}</div><div class="uc-tname">${h.name || 'Home'}</div></div>
        <div class="uc-vs">VS</div>
        <div class="uc-team"><div class="uc-badge" style="background:${a.badge_bg || '#4a0d0d'};color:${a.badge_color || '#f08080'};">${a.code || '?'}</div><div class="uc-tname">${a.name || 'Away'}</div></div>
      </div>
      ${m.venue ? `<div class="uc-details"><div class="uc-detail"><i class="ti ti-map-pin"></i>${m.venue}</div>${m.referee ? `<div class="uc-detail"><i class="ti ti-users"></i>Ref: ${m.referee}</div>` : ''}</div>` : ''}
    </div>`;
  });
  el.innerHTML = html;
}

async function loadTournaments() {
  const el = document.getElementById('tournaments-section');

  if (!data || !data.length) {
    el.innerHTML = `<div class="sec-hd"><div class="sec-title"><span class="sec-bar"></span>Tournaments</div></div>` + emptyState('🏆', 'No Tournaments Yet', 'Tournaments will appear here once they are created.');
    return;
  }

  const icons = { ongoing: '🏆', upcoming: '⚡', done: '🎖️' };
  let html = `<div class="sec-hd"><div class="sec-title"><span class="sec-bar"></span>Tournaments</div></div>
    <div class="pills">
      <button class="pill active" onclick="filterTournaments('all',this)">All</button>
      <button class="pill" onclick="filterTournaments('ongoing',this)">Ongoing</button>
      <button class="pill" onclick="filterTournaments('upcoming',this)">Upcoming</button>
      <button class="pill" onclick="filterTournaments('done',this)">Past</button>
    </div>`;
  data.forEach(t => {
    const statusCls = t.status === 'ongoing' ? 'ongoing' : t.status === 'upcoming' ? 'upcoming' : 'done';
    const statusLbl = t.status === 'ongoing' ? 'Live' : t.status === 'upcoming' ? 'Upcoming' : 'Ended';
    html += `<div class="t-card" data-status="${t.status}">
      <div class="t-card-top">
        <div class="t-icon">${icons[t.status] || '🏅'}</div>
        <div><div class="t-name">${t.name}</div><div class="t-meta">${t.num_teams || '?'} teams · ${t.format || ''}</div></div>
        <div class="t-status ${statusCls}">${statusLbl}</div>
      </div>
      ${t.description ? `<div class="t-desc">${t.description}</div>` : ''}
    </div>`;
  });
  el.innerHTML = html;
}

function filterTournaments(status, btn) {
  document.querySelectorAll('#page-tournaments .pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.t-card').forEach(c => {
    c.style.display = (status === 'all' || c.dataset.status === status) ? 'block' : 'none';
  });
}

// ── STANDINGS PAGE ────────────────────────────────────────────────────────────
async function loadStandings() {
  const el = document.getElementById('standings-section');
  const { data: groups } = await sb.from('tournament_groups')
    .select(`*, tournament:tournament_id(name,status), standings:group_standings(*, team:team_id(name,code,badge_bg,badge_color))`)
    .order('sort_order');

  const { data: brackets } = await sb.from('bracket_matches')
    .select(`*, tournament:tournament_id(name), match:match_id(home_score,away_score,status,home:home_team_id(name,code),away:away_team_id(name,code))`)
    .order('round_order').order('match_order');

  if ((!groups || !groups.length) && (!brackets || !brackets.length)) {
    el.innerHTML = emptyState('📊', 'No Standings Yet', 'Points tables and knockout brackets will appear here once tournaments begin.');
    return;
  }

  let html = '';

  // Group tables
  if (groups && groups.length) {
    const byTournament = {};
    groups.forEach(g => {
      const tname = g.tournament?.name || 'Tournament';
      if (!byTournament[tname]) byTournament[tname] = [];
      byTournament[tname].push(g);
    });
    Object.entries(byTournament).forEach(([tname, gs]) => {
      html += `<div style="margin-bottom:1rem;"><div class="sec-hd"><div class="sec-title"><span class="sec-bar"></span>${tname}</div></div>`;
      gs.forEach(g => {
        const rows = [...(g.standings || [])].sort((a, b) => b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga));
        html += `<div style="background:var(--navy2);border:1px solid var(--border);border-radius:10px;padding:.9rem;margin-bottom:10px;">
          <div style="font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;margin-bottom:10px;color:var(--blue-light);">${g.name}</div>
          <div style="overflow-x:auto;"><table class="standings-table" style="min-width:420px;">
            <thead><tr><th>#</th><th>Team</th><th>MP</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead>
            <tbody>`;
        rows.forEach((s, i) => {
          const t = s.team || {};
          const gd = s.gf - s.ga;
          html += `<tr>
            <td><span class="pos${i < 2 ? ' top' : ''}">${i + 1}</span></td>
            <td><div class="tinline"><div class="mbadge" style="background:${t.badge_bg || '#0d2a5c'};color:${t.badge_color || '#7ab0f5'};">${t.code || '?'}</div>${t.name || '?'}</div></td>
            <td>${s.mp}</td><td style="color:var(--green);">${s.w}</td><td style="color:var(--silver2);">${s.d}</td><td style="color:var(--red);">${s.l}</td>
            <td>${s.gf}</td><td>${s.ga}</td>
            <td style="color:${gd > 0 ? 'var(--green)' : gd < 0 ? 'var(--red)' : 'var(--silver2)'};">${gd > 0 ? '+' : ''}${gd}</td>
            <td><span class="pts">${s.pts}</span></td>
          </tr>`;
        });
        html += `</tbody></table></div></div>`;
      });
      html += `</div>`;
    });
  }

  // Brackets
  if (brackets && brackets.length) {
    const byTournament = {};
    brackets.forEach(b => {
      const tname = b.tournament?.name || 'Knockout';
      if (!byTournament[tname]) byTournament[tname] = {};
      if (!byTournament[tname][b.round_name]) byTournament[tname][b.round_name] = { order: b.round_order, matches: [] };
      byTournament[tname][b.round_name].matches.push(b);
    });
    Object.entries(byTournament).forEach(([tname, rounds]) => {
      const sortedRounds = Object.entries(rounds).sort((a, b) => a[1].order - b[1].order);
      html += `<div class="sec-hd" style="margin-top:1rem;"><div class="sec-title"><span class="sec-bar"></span>${tname} · Bracket</div></div>
        <div style="background:var(--navy2);border:1px solid var(--border);border-radius:10px;padding:.9rem;margin-bottom:10px;">
        <div class="bracket-wrap"><div class="bracket">`;
      sortedRounds.forEach(([rname, rdata]) => {
        html += `<div class="b-round"><div class="b-round-title">${rname}</div>`;
        rdata.matches.sort((a, b) => a.match_order - b.match_order).forEach(bm => {
          const m = bm.match;
          const ft = m?.status === 'ft';
          const hWin = ft && m.home_score > m.away_score;
          const aWin = ft && m.away_score > m.home_score;
          const isTbd = bm.home_label === 'TBD' && !m;
          html += `<div class="b-match" onclick="${m ? `openMatch('${bm.match_id}')` : ''}">
            <div class="b-team${hWin ? ' winner' : ''}${isTbd ? ' tbd' : ''}">${m?.home?.name || bm.home_label} <span class="b-sc">${ft ? m.home_score : '–'}</span></div>
            <div class="b-team${aWin ? ' winner' : ''}${isTbd ? ' tbd' : ''}">${m?.away?.name || bm.away_label} <span class="b-sc">${ft ? m.away_score : '–'}</span></div>
          </div>`;
        });
        html += `</div>`;
      });
      html += `</div></div></div>`;
    });
  }

  el.innerHTML = html;
}

let historyData = [];
async function loadHistory() {
  const { data } = await sb.from('matches')
    .select(`*, half_duration, home:home_team_id(name,code,badge_bg,badge_color), away:away_team_id(name,code,badge_bg,badge_color), tournament:tournament_id(name,is_friendly)`)

function filterHistory(type, btn) {
  document.querySelectorAll('#page-history .pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderHistory(type);
}

function renderHistory(filter) {
  const el = document.getElementById('history-list');
  let list = historyData;
  if (filter === 'tournament') list = list.filter(m => !m.is_friendly && !m.tournament?.is_friendly);
  if (filter === 'friendly') list = list.filter(m => m.is_friendly || m.tournament?.is_friendly);

  if (!list.length) {
    el.innerHTML = `<div style="padding:0 1rem;">` + emptyState('📋', 'No Match History Yet', 'Completed matches will appear here after full time is called.') + `</div>`;
    return;
  }

  let html = '', lastDate = '';
  list.forEach(m => {
    const dateStr = fmtDate(m.match_date);
    if (dateStr !== lastDate) { html += `<div class="history-group-label">${dateStr}</div>`; lastDate = dateStr; }
    const h = m.home || {}, a = m.away || {};
    const tName = m.tournament?.name || 'Match';
    const isFriendly = m.is_friendly || m.tournament?.is_friendly;
    html += `<div class="history-entry" onclick="openMatch('${m.id}')">
      <div class="he-tournament">${tName}${m.stage ? ' · ' + m.stage : ''}${isFriendly ? ' · <span style="color:var(--gold);">Friendly</span>' : ''}</div>
      <div class="he-row">
        <div class="team" style="gap:6px;"><div class="tbadge" style="${h.badge_bg ? `background:${h.badge_bg};color:${h.badge_color}` : 'background:#0d2a5c;color:#7ab0f5'};width:24px;height:24px;font-size:9px;">${h.code || '?'}</div><div class="he-team">${h.name || 'Home'}</div></div>
        <div class="he-score">${m.home_score} – ${m.away_score}</div>
        <div class="team" style="gap:6px;flex-direction:row-reverse;"><div class="he-team" style="text-align:right;">${a.name || 'Away'}</div><div class="tbadge" style="${a.badge_bg ? `background:${a.badge_bg};color:${a.badge_color}` : 'background:#4a0d0d;color:#f08080'};width:24px;height:24px;font-size:9px;">${a.code || '?'}</div></div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

async function openTeam(id) {
  const t = teamsData[id];
  if (!t) return;
  const { data: players } = await sb.from('players').select('*').eq('team_id', id).order('goals', { ascending: false });
  const { data: trophies } = await sb.from('trophies').select('*, tournament:tournament_id(name)').eq('team_id', id);

  document.getElementById('team-modal-label').textContent = t.name;
  const posClass = { GK: 'gk', DEF: 'def', MID: 'mid', FWD: 'fwd' };
  const topScorers = [...(players || [])].sort((a, b) => b.goals - a.goals).slice(0, 4);
  const topAssists = [...(players || [])].sort((a, b) => b.assists - a.assists).slice(0, 4);

  let html = `
  <div class="team-hero">
    <div class="team-hero-bg">${t.code}</div>
    <div class="team-hero-badge" style="background:${t.badge_bg};color:${t.badge_color};">${t.code}</div>
    <div class="team-hero-name">${t.name}</div>
    <div class="team-hero-sub">Est. ${t.founded_year || '—'} · Captain: ${t.captain || '—'}</div>
    <div class="team-hero-type team-type-badge ${t.type || 'hostel'}">${(t.type || 'hostel').charAt(0).toUpperCase() + (t.type || 'hostel').slice(1)}</div>
  </div>`;

  if (trophies && trophies.length) {
    html += `<div class="modal-section"><div class="modal-sec-title"><span class="sec-bar"></span>Honours</div>`;
    trophies.forEach(tr => { html += `<div class="trophy-row"><div class="trophy-icon">${tr.icon || '🏆'}</div><div><div class="trophy-name">${tr.name}</div>${tr.year ? `<div class="trophy-year">${tr.year}</div>` : ''}</div></div>`; });
    html += `</div>`;
  }

  if (topScorers.length) {
    html += `<div class="modal-section" style="padding-top:0;"><div class="modal-sec-title"><span class="sec-bar"></span>Top Scorers</div><div class="team-player-scroll">`;
    topScorers.forEach(p => { const ini = initials(p.name); html += `<div class="team-pcard" onclick="closeTeam();setTimeout(()=>openPlayer('${p.id}'),50);"><div class="team-pavatar" style="background:${t.badge_bg};color:${t.badge_color};">${ini}</div><div class="team-pname">${p.name.split(' ')[0]}</div><div class="team-pval">${p.goals}</div><div class="team-plbl">Goals</div></div>`; });
    html += `</div></div>`;
  }
  if (topAssists.length) {
    html += `<div class="modal-section" style="padding-top:0;"><div class="modal-sec-title"><span class="sec-bar"></span>Top Assists</div><div class="team-player-scroll">`;
    topAssists.forEach(p => { const ini = initials(p.name); html += `<div class="team-pcard" onclick="closeTeam();setTimeout(()=>openPlayer('${p.id}'),50);"><div class="team-pavatar" style="background:${t.badge_bg};color:${t.badge_color};">${ini}</div><div class="team-pname">${p.name.split(' ')[0]}</div><div class="team-pval">${p.assists}</div><div class="team-plbl">Assists</div></div>`; });
    html += `</div></div>`;
  }

  if (players && players.length) {
    html += `<div class="modal-section" style="padding-top:0;"><div class="modal-sec-title"><span class="sec-bar"></span>Squad (${players.length})</div>
    <table class="squad-table"><thead><tr><th>Player</th><th>Pos</th><th>Batch</th><th>MP</th><th>G</th><th>A</th></tr></thead><tbody>`;
    players.forEach(p => {
      html += `<tr onclick="closeTeam();setTimeout(()=>openPlayer('${p.id}'),50);" style="cursor:pointer;">
        <td><div class="squad-name">${p.name}</div></td>
        <td><span class="squad-pos ${posClass[p.position] || 'mid'}">${p.position || '?'}</span></td>
        <td style="color:var(--silver2);font-size:12px;">${p.batch_year || '?'}</td>
        <td>${p.matches_played}</td><td><span class="squad-goals">${p.goals}</span></td><td>${p.assists}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  html += `<div style="height:24px;"></div>`;
  document.getElementById('team-modal-content').innerHTML = html;
  document.getElementById('team-modal').classList.add('open');
  document.getElementById('team-modal').scrollTop = 0;
}
function closeTeam() { document.getElementById('team-modal').classList.remove('open'); }

// ── PLAYERS PAGE ──────────────────────────────────────────────────────────────
let allPlayersData = [];
async function loadPlayers() {
  const el = document.getElementById('players-section');
  const { data } = await sb.from('players').select('*, team:team_id(name,badge_bg,badge_color)').order('goals', { ascending: false });
  allPlayersData = data || [];

  if (!allPlayersData.length) {
    el.innerHTML = `<div class="sec-hd"><div class="sec-title"><span class="sec-bar"></span>Players</div></div>` + emptyState('👤', 'No Players Yet', 'Player profiles will appear here once they are added.');
    return;
  }

  const topScorers = [...allPlayersData].sort((a, b) => b.goals - a.goals).slice(0, 5);
  const topAssists = [...allPlayersData].sort((a, b) => b.assists - a.assists).slice(0, 5);
  const topYellows = [...allPlayersData].sort((a, b) => b.yellows - a.yellows).slice(0, 4);

  // Get unique teams for filter
  const teams = [...new Set(allPlayersData.map(p => p.team?.name).filter(Boolean))];

  function pcard(p, stat, lbl, color = 'var(--blue-light)') {
    const bg = p.team?.badge_bg || '#0d2a5c', col = p.team?.badge_color || '#7ab0f5';
    return `<div class="pcard" onclick="openPlayer('${p.id}')">
      <div class="pavatar" style="background:${bg};color:${col};">${initials(p.name)}</div>
      <div class="pname">${p.name.split(' ')[0]} ${(p.name.split(' ').slice(-1)[0] || '')[0] || ''}.</div>
      <div class="pstat" style="color:${color};">${p[stat] || 0}</div>
      <div class="pstat-lbl">${lbl}</div>
    </div>`;
  }

  let html = `
    <div class="sec-hd"><div class="sec-title"><span class="sec-bar"></span>Top Scorers</div></div>
    <div class="pscroll">${topScorers.map(p => pcard(p, 'goals', 'Goals')).join('')}</div>
    <div class="sec-hd" style="margin-top:1rem;"><div class="sec-title"><span class="sec-bar"></span>Most Assists</div></div>
    <div class="pscroll">${topAssists.map(p => pcard(p, 'assists', 'Assists')).join('')}</div>
    <div class="sec-hd" style="margin-top:1rem;"><div class="sec-title"><span class="sec-bar"></span>Discipline</div></div>
    <div class="pscroll">${topYellows.map(p => pcard(p, 'yellows', 'Yellows', 'var(--gold)')).join('')}</div>
    <div class="divider" style="margin:1.2rem 0;"></div>
    <div class="sec-hd"><div class="sec-title"><span class="sec-bar"></span>All Players</div></div>
    <div class="filter-row">
      <select class="filter-dropdown" id="filter-team" onchange="renderAllPlayers()">
        <option value="all">All Teams</option>
        ${teams.map(t => `<option>${t}</option>`).join('')}
      </select>
      <select class="filter-dropdown" id="filter-pos" onchange="renderAllPlayers()">
        <option value="all">All Positions</option><option>GK</option><option>DEF</option><option>MID</option><option>FWD</option>
      </select>
      <select class="filter-dropdown" id="filter-sort" onchange="renderAllPlayers()">
        <option value="goals">Sort: Goals</option><option value="assists">Sort: Assists</option>
        <option value="matches">Sort: Matches</option><option value="name">Sort: Name</option>
      </select>
    </div>
    <div id="all-players-list"></div>`;
  el.innerHTML = html;
  renderAllPlayers();
}

function renderAllPlayers() {
  const tf = document.getElementById('filter-team')?.value || 'all';
  const pf = document.getElementById('filter-pos')?.value || 'all';
  const sf = document.getElementById('filter-sort')?.value || 'goals';
  const posC = { GK: 'gk', DEF: 'def', MID: 'mid', FWD: 'fwd' };
  let list = [...allPlayersData];
  if (tf !== 'all') list = list.filter(p => p.team?.name === tf);
  if (pf !== 'all') list = list.filter(p => p.position === pf);
  if (sf === 'goals') list.sort((a, b) => b.goals - a.goals);
  else if (sf === 'assists') list.sort((a, b) => b.assists - a.assists);
  else if (sf === 'matches') list.sort((a, b) => b.matches_played - a.matches_played);
  else list.sort((a, b) => a.name.localeCompare(b.name));
  const el = document.getElementById('all-players-list');
  if (!el) return;
  if (!list.length) { el.innerHTML = '<div style="text-align:center;color:var(--silver2);padding:2rem;font-size:13px;">No players match this filter.</div>'; return; }
  el.innerHTML = list.map(p => {
    const bg = p.team?.badge_bg || '#0d2a5c', col = p.team?.badge_color || '#7ab0f5';
    return `<div class="player-list-item" onclick="openPlayer('${p.id}')">
      <div class="pli-avatar" style="background:${bg};color:${col};">${initials(p.name)}</div>
      <div class="pli-info">
        <div class="pli-name">${p.name}</div>
        <div class="pli-meta"><span class="squad-pos ${posC[p.position] || 'mid'}">${p.position || '?'}</span> · ${p.team?.name || '—'} · Batch ${p.batch_year || '?'}</div>
      </div>
      <div class="pli-stats">
        <div class="pli-stat"><div class="pli-stat-num">${p.goals}</div><div class="pli-stat-lbl">G</div></div>
        <div class="pli-stat"><div class="pli-stat-num">${p.assists}</div><div class="pli-stat-lbl">A</div></div>
        <div class="pli-stat"><div class="pli-stat-num">${p.matches_played}</div><div class="pli-stat-lbl">MP</div></div>
      </div>
    </div>`;
  }).join('');
}

async function openPlayer(id) {
  const p = allPlayersData.find(x => x.id === id);
  if (!p) return;
  const { data: trophies } = await sb.from('trophies').select('*').eq('player_id', id);
  const draws = (p.matches_played || 0) - (p.matches_won || 0) - (p.matches_lost || 0);
  const wr = p.matches_played ? Math.round(p.matches_won / p.matches_played * 100) : 0;
  const posLabel = { GK: 'Goalkeeper', DEF: 'Defender', MID: 'Midfielder', FWD: 'Forward' };

  document.getElementById('player-modal-label').textContent = p.name;
  const bg = p.team?.badge_bg || '#0d2a5c', col = p.team?.badge_color || '#7ab0f5';

  let html = `

    <div class="player-hero-bg">${initials(p.name)}</div>
    <div class="player-avatar-lg" style="background:${bg};color:${col};">${initials(p.name)}</div>
    <div class="player-hero-name">${p.name}</div>
    <div class="player-hero-meta">
      <span><span class="squad-pos ${{ GK: 'gk', DEF: 'def', MID: 'mid', FWD: 'fwd' }[p.position] || 'mid'}">${posLabel[p.position] || p.position || '?'}</span></span>
      <span>⚽ ${p.team?.name || '—'}</span>
      <span>🎓 Batch ${p.batch_year || '?'}</span>

  </div>
  <div class="player-stat-grid">
    <div class="psg-cell"><div class="psg-num blue">${p.goals}</div><div class="psg-lbl">Goals</div></div>
    <div class="psg-cell"><div class="psg-num blue">${p.assists}</div><div class="psg-lbl">Assists</div></div>
    <div class="psg-cell"><div class="psg-num">${p.matches_played}</div><div class="psg-lbl">Played</div></div>
    <div class="psg-cell"><div class="psg-num green">${p.matches_won || 0}</div><div class="psg-lbl">Won</div></div>
    <div class="psg-cell"><div class="psg-num silver">${draws}</div><div class="psg-lbl">Drawn</div></div>
    <div class="psg-cell"><div class="psg-num red">${p.matches_lost || 0}</div><div class="psg-lbl">Lost</div></div>
    <div class="psg-cell"><div class="psg-num gold">${p.yellows}</div><div class="psg-lbl">Yellows</div></div>
    <div class="psg-cell"><div class="psg-num red">${p.reds}</div><div class="psg-lbl">Reds</div></div>

  <div class="modal-section" style="padding-top:0;">

    <div class="player-career-row"><div class="pcr-label">Goals per Match</div><div class="pcr-val">${p.matches_played ? (p.goals / p.matches_played).toFixed(2) : '—'}</div></div>
    <div class="player-career-row"><div class="pcr-label">Assists per Match</div><div class="pcr-val">${p.matches_played ? (p.assists / p.matches_played).toFixed(2) : '—'}</div></div>
    <div class="player-career-row"><div class="pcr-label">Goal Contributions</div><div class="pcr-val">${p.goals + p.assists}</div></div>
    <div class="player-career-row"><div class="pcr-label">Penalty Goals</div><div class="pcr-val">${p.pen_goals || 0}</div></div>

}
function closePlayer() { document.getElementById('player-modal').classList.remove('open'); }

// ── MATCH MODAL ───────────────────────────────────────────────────────────────
async function openMatch(id) {
  const { data: m } = await sb.from('matches')
    .select(`*, home:home_team_id(name,code,badge_bg,badge_color), away:away_team_id(name,code,badge_bg,badge_color), tournament:tournament_id(name)`)
    .eq('id', id).single();
  const { data: events } = await sb.from('timeline_events').select('*').eq('match_id', id).order('sort_order').order('created_at');
  if (!m) return;

  document.getElementById('modal-label').textContent = m.tournament?.name || 'Match';
  const h = m.home || {}, a = m.away || {};
  const isUpcoming = m.status === 'upcoming';
  const isLive = m.status === 'live';
  const statusLabel = isLive ? m.minute + "'" : m.status.toUpperCase();

  const scoreHtml = isUpcoming
    ? `<div class="modal-score-big" style="font-size:32px;color:var(--silver2);">VS</div>`
    : `<div class="modal-score-big">${m.home_score} <span style="color:var(--silver2);font-size:32px;">–</span> ${m.away_score}</div>`;

  // Scorers from timeline
  const goals = (events || []).filter(e => e.type === 'goal');
  const homeScorers = goals.filter(e => e.side === h.name).map(e => `⚽ ${e.event_label?.replace('GOAL — ', '')} ${e.minute}`);
  const awayScorers = goals.filter(e => e.side === a.name).map(e => `${e.event_label?.replace('GOAL — ', '')} ${e.minute} ⚽`);

  let html = `<div class="modal-scoreboard">
    <div class="modal-tournament">${m.tournament?.name || ''}${m.stage ? ' · ' + m.stage : ''}</div>
    <div class="modal-teams">
      <div class="modal-team"><div class="modal-badge" style="background:${h.badge_bg || '#0d2a5c'};color:${h.badge_color || '#7ab0f5'};">${h.code || '?'}</div><div class="modal-tname">${h.name || 'Home'}</div></div>
      <div class="modal-score-center">${scoreHtml}
        <div class="modal-score-label" style="${isLive ? 'color:var(--red);' : ''}">
          ${isLive ? `<span style="display:inline-flex;align-items:center;gap:4px;"><span style="width:6px;height:6px;background:var(--red);border-radius:50%;display:inline-block;animation:blink 1s infinite;"></span>${statusLabel}</span>` : statusLabel}
        </div>
      </div>
      <div class="modal-team"><div class="modal-badge" style="background:${a.badge_bg || '#4a0d0d'};color:${a.badge_color || '#f08080'};">${a.code || '?'}</div><div class="modal-tname">${a.name || 'Away'}</div></div>
    </div>
    ${!isUpcoming && (homeScorers.length || awayScorers.length) ? `<div class="modal-scorers"><div class="modal-scorer-col">${homeScorers.map(s => `<div>${s}</div>`).join('')}</div><div class="modal-scorer-col right">${awayScorers.map(s => `<div>${s}</div>`).join('')}</div></div>` : ''}
  </div>`;

  if (isUpcoming) {
    html += `<div class="modal-section"><div class="modal-sec-title"><span class="sec-bar"></span>Match Info</div>
      <div style="font-size:13px;color:var(--silver);line-height:2;">
        <div><span style="color:var(--silver2);font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;">Date & Time</span><br>${fmtDate(m.match_date)} ${fmtTime(m.match_time)}</div>
        ${m.venue ? `<div style="margin-top:8px;"><span style="color:var(--silver2);font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;">Venue</span><br>${m.venue}</div>` : ''}
        ${m.referee ? `<div style="margin-top:8px;"><span style="color:var(--silver2);font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;">Referee</span><br>${m.referee}</div>` : ''}
      </div>
    </div>`;
  } else {
    // Stats — show for live and ft matches
    if (m.stats || m.status === 'live' || m.status === 'ft' || m.status === 'ht') {
      const s = m.stats || {};
      const statRows = [
        ['Goals', m.home_score || 0, m.away_score || 0],
        ['Shots', s.shots?.[0] || 0, s.shots?.[1] || 0],
        ['Shots on Target', s.shotsOnTarget?.[0] || 0, s.shotsOnTarget?.[1] || 0],
        ['Corners', s.corners?.[0] || 0, s.corners?.[1] || 0],
        ['Offsides', s.offsides?.[0] || 0, s.offsides?.[1] || 0],
        ['Fouls', s.fouls?.[0] || 0, s.fouls?.[1] || 0],
        ['Free Kicks', s.freekicks?.[0] || 0, s.freekicks?.[1] || 0],
        ['Saves', s.saves?.[0] || 0, s.saves?.[1] || 0],
        ['Yellow Cards', s.yellows?.[0] || 0, s.yellows?.[1] || 0],
        ['Red Cards', s.reds?.[0] || 0, s.reds?.[1] || 0],
      ];
      const hasStats = true; // always show stats for live/ft matches
      if (hasStats) {
        html += `<div class="modal-section"><div class="modal-sec-title"><span class="sec-bar"></span>Match Stats</div>`;
        statRows.forEach(([label, hv, av]) => {
          const total = hv + av || 1;
          const hp = Math.round(hv / total * 100);
          const ap = Math.round(av / total * 100);
          html += `<div class="full-stat-row">
            <div style="text-align:right;"><div class="home-num">${hv}</div><div class="home-bar-wrap" style="margin-top:3px;"><div class="home-bar-fill" style="width:${hp}%;"></div></div></div>
            <div class="stat-center"><div class="slabel">${label}</div></div>
            <div><div class="away-num">${av}</div><div class="away-bar-wrap" style="margin-top:3px;"><div class="away-bar-fill" style="width:${ap}%;"></div></div></div>
          </div>`;
        });
        html += `</div>`;
      }
    }

    // Cards
    const yellows = (events || []).filter(e => e.type === 'yellow');
    const reds = (events || []).filter(e => e.type === 'red');
    if (yellows.length || reds.length) {
      html += `<div class="modal-section" style="padding-top:0;"><div class="modal-sec-title"><span class="sec-bar"></span>Cards</div>`;
      [...yellows, ...reds].forEach(e => {
        const isRed = e.type === 'red';
        html += `<div class="cards-row"><div class="card-icon ${isRed ? 'red' : 'yellow'}"></div><div style="flex:1;"><div class="card-player">${e.event_label?.replace(/Yellow Card — |Red Card — /, '') || '?'}</div><div class="card-team">${e.side || ''}</div></div><div class="card-min">${e.minute}</div></div>`;
      });
      html += `</div>`;
    }

    // Timeline
    if (events && events.length) {
      const icons = { goal: '⚽', yellow: '🟨', red: '🟥', save: '🧤', corner: '📐', sub: '🔄', highlight: '🎬', freekick: '🟠', shot: '🎯', shot_on_target: '🎯', offside: '🚩', foul: '🟣', stoppage: '⏱' };
      html += `<div class="modal-section" style="padding-bottom:4px;"><div class="modal-sec-title"><span class="sec-bar"></span>Match Timeline</div></div><div class="timeline">`;
      events.forEach(e => {
        html += `<div class="tl-item">
          <div class="tl-min">${e.minute}</div>
          <div class="tl-dot-wrap"><div class="tl-dot ${e.type || 'ko'}">${icons[e.type] || ''}</div></div>
          <div class="tl-body">
            <div class="tl-event">${e.event_label || ''}${e.is_pen ? '<span class="tl-badge pen">PEN</span>' : ''}</div>
            ${e.detail ? `<div class="tl-detail">${e.detail}</div>` : ''}
            ${e.side ? `<div class="tl-side">${e.side}</div>` : ''}
            ${e.highlight_url ? `<div class="tl-detail"><a href="${e.highlight_url}" target="_blank" style="color:#a855f7;">🎬 Watch highlight</a></div>` : ''}
          </div>
        </div>`;
      });
      html += `</div>`;

      // Highlights
      const highlights = events.filter(e => e.type === 'highlight' || e.highlight_url);
      if (highlights.length) {
        html += `<div class="modal-section" style="padding-top:0;"><div class="modal-sec-title"><span class="sec-bar"></span>Highlights</div>`;
        highlights.forEach(hl => {
          html += `<div style="background:var(--navy3);border-radius:8px;padding:.75rem;margin-bottom:8px;display:flex;align-items:center;gap:10px;">
            <div style="width:36px;height:36px;border-radius:8px;background:rgba(168,85,247,.2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">🎬</div>
            <div style="flex:1;"><div style="font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;">${hl.event_label || 'Highlight'}</div>${hl.detail ? `<div style="font-size:11px;color:var(--silver2);">${hl.detail}</div>` : ''}</div>
            ${hl.highlight_url ? `<a href="${hl.highlight_url}" target="_blank" style="background:rgba(168,85,247,.2);color:#c084fc;border-radius:6px;padding:5px 10px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;text-decoration:none;flex-shrink:0;">Watch</a>` : ''}
          </div>`;
        });
        html += `</div>`;
      }
    }
  }

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('match-modal').classList.add('open');
  document.getElementById('match-modal').scrollTop = 0;
}
function closeMatch() { document.getElementById('match-modal').classList.remove('open'); }

// ── BOOT ─────────────────────────────────────────────────────────────────────
// ── LIVE CLOCK SYSTEM ────────────────────────────────────────────────────────
// Stores live match state: { id, minute, status, half }
let liveMatchClocks = {};
let publicClockInterval = null;

// Public clock: one global second-level ticker
let publicClockTicker = null;

function startPublicClocks() {
  if (publicClockTicker) clearInterval(publicClockTicker);

  publicClockTicker = setInterval(() => {
    const liveIds = Object.keys(liveMatchClocks).filter(id => liveMatchClocks[id].status === 'live');
    if (!liveIds.length) return;

    liveIds.forEach(id => {
      const m = liveMatchClocks[id];
      if (m.status !== 'live') return;

      // Increment total seconds since we started tracking
      m.totalSeconds = (m.totalSeconds || 0) + 1;
      const secsIntoMinute = m.totalSeconds % 60;

      // Update the seconds display in the match card footer every second
      const secEl = document.getElementById('mf-sec-' + id);
      if (secEl) secEl.textContent = String(secsIntoMinute).padStart(2,'0');

      // Every 60 real seconds, increment the minute display
      if (secsIntoMinute === 0) {
        m.minute++;
        const minEl = document.getElementById('mf-min-' + id);
        if (minEl) minEl.textContent = getDisplayMin(m.minute, m.half) + "'";
      }
    });
  }, 1000);
}

function getDisplayMin(minute, half, halfDur) {
  const ht = halfDur || 45;
  const ft = ht * 2;
  if (half === 1) {
    return minute <= ht ? minute : `${ht}+${minute - ht}`;
  } else if (half === 2) {
    const elapsed = minute - ht;
    if (elapsed <= ht) return ht + elapsed;
    return `${ft}+${elapsed - ht}`;
  } else {
    // Fallback
    return minute;
  }
}

// Refresh live match data from Supabase every 30 seconds
async function refreshLiveMatches() {
  const { data } = await sb.from('matches')
    .select('id,home_score,away_score,status,minute,half_duration,home:home_team_id(name,code,badge_bg,badge_color),away:away_team_id(name,code,badge_bg,badge_color),tournament:tournament_id(name),stage,is_friendly,match_date,match_time')
    .in('status', ['live', 'ht']);

  if (!data || !data.length) {
    // No live matches — clear clocks
    liveMatchClocks = {};
    return;
  }

  let anyChange = false;
  data.forEach(m => {
    const prev = liveMatchClocks[m.id];
    const halfDur = m.half_duration || 45;
    const half = m.minute <= halfDur ? 1 : 2;

    // Update clock state
    liveMatchClocks[m.id] = { minute: m.minute || 0, status: m.status, half, halfDur };

    // Update score display
    const homeEl = document.getElementById('sh-' + m.id);
    const awayEl = document.getElementById('sa-' + m.id);
    const footEl = document.getElementById('mf-' + m.id);
    const minEl  = document.getElementById('mf-min-' + m.id);

    if (homeEl) homeEl.textContent = m.home_score;
    if (awayEl) awayEl.textContent = m.away_score;

    if (m.status === 'live') {
      if (minEl) minEl.textContent = getDisplayMin(m.minute || 0, half, halfDur) + "'";
      if (footEl) footEl.className = 'match-foot live-t';
    } else if (m.status === 'ht') {
      if (footEl) { footEl.textContent = `HT — ${halfDur}' · Tap for match facts`; footEl.className = 'match-foot live-t'; }
    }

    if (!prev) anyChange = true;
  });

  if (anyChange) loadScores();

  // Don't reset seconds — just update the minute from DB, clock keeps ticking
  // The totalSeconds tracker continues from where it is
}

// Realtime subscription for instant updates when admin changes score/status
function subscribeToLiveUpdates() {
  sb.channel('public-live')
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'matches'
    }, payload => {
      const m = payload.new;

      // Update displayed score immediately
      const homeEl = document.getElementById('sh-' + m.id);
      const awayEl = document.getElementById('sa-' + m.id);
      const footEl = document.getElementById('mf-' + m.id);

      if (homeEl) homeEl.textContent = m.home_score;
      if (awayEl) awayEl.textContent = m.away_score;

      // Update clock state
      if (m.status === 'live') {
        const half = m.minute <= 45 ? 1 : 2;
        liveMatchClocks[m.id] = { minute: m.minute || 0, status: 'live', half };
        if (footEl) {
          const min = getDisplayMin(m.minute || 0, half);
          footEl.textContent = `⏱ ${min}' · Tap for match facts`;
          footEl.className = 'match-foot live-t';
        }
      } else if (m.status === 'ht') {
        if (liveMatchClocks[m.id]) liveMatchClocks[m.id].status = 'ht';
        if (footEl) { footEl.textContent = 'HT · Tap for match facts'; footEl.className = 'match-foot live-t'; }
      } else if (m.status === 'ft') {
        // Match ended — remove from live clocks, reload scores section
        delete liveMatchClocks[m.id];
        loadScores();
      }
    })
    .subscribe();
}

setTimeout(() => {
  subscribeToLiveUpdates();
  refreshLiveMatches();

  setInterval(refreshLiveMatches, 30000);
